      - "Issue VMS alert: HEAVY CONGESTION - EXPECT DELAYS"
  medium_severity:
    manpower: "2 Traffic Constables"
    barricading: "4 Standard Barricades"
    diversion: "Partial lane closure. Route heavy vehicles to alternate paths."
    actions:
      - "Manually cycle traffic signals at intersections"
    communications:
      - "Issue VMS alert: CONGESTION AHEAD - REDUCE SPEED"
  low_severity:
    manpower: "1 Traffic Constable (Monitor only)"
    barricading: "None required"
    diversion: "No diversion needed."
    actions:
      - "Monitor loop detectors and camera feeds"
    communications:
      - "No alerts required"
      
