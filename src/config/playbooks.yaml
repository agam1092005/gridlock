accident:
  high_severity:
    manpower: "1 Inspector, 4 Traffic Constables"
    barricading: "10 Heavy Barricades, 5 Cones"
    diversion: "Major detour via adjacent arterial roads. Complete block of node."
    actions:
      - "Dispatch Emergency Services (EMS + Police)"
      - "Close affected lanes immediately"
      - "Deploy tow trucks to clear wreckage"
    communications:
      - "Issue critical VMS alert: ACCIDENT AHEAD - USE ALT ROUTE"
      - "Notify local news traffic desks"
  medium_severity:
    manpower: "2 Traffic Constables"
    barricading: "4 Standard Barricades"
    diversion: "Partial lane closure. Route heavy vehicles to alternate paths."
    actions:
      - "Dispatch Highway Patrol"
      - "Close 1 lane for safety"
    communications:
      - "Issue VMS alert: ACCIDENT AHEAD - REDUCE SPEED"
  low_severity:
    manpower: "1 Traffic Constable (Monitor only)"
    barricading: "None required"
    diversion: "No diversion needed."
    actions:
      - "Monitor scene via patrol vehicle"
    communications:
      - "No public alerts required"

congestion:
  high_severity:
    manpower: "1 Inspector, 4 Traffic Constables"
    barricading: "10 Heavy Barricades, 5 Cones"
    diversion: "Major detour via adjacent arterial roads. Complete block of node."
    actions:
      - "Adjust traffic signal timing for maximum throughput"
      - "Open HOV lanes to all traffic temporarily"
    communications:
      - "Issue VMS alert: HEAVY CONGESTION - EXPECT DELAYS"
  medium_severity:
    manpower: "2 Traffic Constables"
    barricading: "4 Standard Barricades"
    diversion: "Partial lane closure. Route heavy vehicles to alternate paths."
    actions:
      - "Manually cycle traffic signals at intersections"
    communications:
      - "Issue VMS alert: CONGESTION AHEAD - REDUCE SPEED"
  low_severity:
    manpower: "1 Traffic Constable (Monitor only)"
    barricading: "None required"
    diversion: "No diversion needed."
    actions:
      - "Monitor loop detectors and camera feeds"
    communications:
      - "No alerts required"
      
generic_fallback:
  high_severity:
    manpower: "1 Inspector, 4 Traffic Constables"
    barricading: "10 Heavy Barricades, 5 Cones"
    diversion: "Major detour via adjacent arterial roads. Complete block of node."
    actions:
      - "Dispatch incident response team for assessment"
      - "Monitor via CCTV"
    communications:
      - "Issue general advisory: INCIDENT AHEAD - EXPECT DELAYS"
  medium_severity:
    manpower: "2 Traffic Constables"
    barricading: "4 Standard Barricades"
    diversion: "Partial lane closure. Route heavy vehicles to alternate paths."
    actions:
      - "Dispatch incident patrol unit"
    communications:
      - "Issue general advisory: EXPECT DELAYS"
  low_severity:
    manpower: "1 Traffic Constable (Monitor only)"
    barricading: "None required"
    diversion: "No diversion needed."
    actions:
      - "Monitor via traffic cameras"
    communications:
      - "No action required"

water_logging:
  high_severity:
    manpower: "1 Inspector, 2 Constables (Traffic direction only)"
    barricading: "Deploy heavy water-filled barriers and reflective cones"
    diversion: "Block underpass. Divert 2-wheelers to elevated service roads immediately."
    special_equipment: "Request 2 High-Capacity Dewatering Pumps"
    agency_sync: "Alert BBMP Stormwater Drain Taskforce & BESCOM (Power cutoff risk)"
    public_advisory: "Update Navigation APIs: 'Severe Waterlogging'. Flash FM Radio alerts."

public_event:
  high_severity:
    manpower: "2 Inspectors, 8 Constables, 4 Home Guards"
    barricading: "Deploy rope cordons and pedestrian channelizers"
    diversion: "Establish 500m vehicle-free perimeter. Route traffic to arterial ring."
    special_equipment: "Deploy Mobile VMS (Variable Message Sign) boards at major entry points."
    agency_sync: "Coordinate with BMTC for temporary bus stop relocation"
    public_advisory: "Issue Twitter/Social Media advisory detailing alternative parking zones."

vehicle_breakdown:
  high_severity:
    manpower: "2 Traffic Constables"
    barricading: "Standard warning triangles and 4 cones"
    diversion: "Close left lane only. Merge traffic to right lanes."
    special_equipment: "Heavy-duty Flatbed Tow Truck / Crane"
    agency_sync: "None required"
    public_advisory: "Update Navigation APIs: 'Lane blocked due to broken down heavy vehicle'"
