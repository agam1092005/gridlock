# Prometheus Configuration for Gridlock 2.0 Monitoring
# Scrapes metrics from API service and stores time-series data

global:
  scrape_interval: 15s        # Default scrape interval
  evaluation_interval: 15s    # Default evaluation interval
  external_labels:
    monitor: 'gridlock-monitor'
    environment: 'docker-compose'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "prometheus-rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Gridlock API metrics
  - job_name: 'gridlock_api'
    metrics_path: '/api/metrics'
    scrape_interval: 5s
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'
          component: 'fastapi'

  # PostgreSQL metrics
  - job_name: 'gridlock_postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis metrics
  - job_name: 'gridlock_redis'
    static_configs:
      - targets: ['redis-exporter:9121']

